<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Spanish Vocabulary Trainer</title>
<style>
:root{
  --bg:#0f172a; --panel:#111827; --line:#334155; --text:#e5e7eb; --muted:#94a3b8;
  --green:#22c55e; --blue:#38bdf8; --orange:#f59e0b; --violet:#a78bfa; --soft:#cbd5e1;
}
*{box-sizing:border-box}
body{font-family:Arial,sans-serif;background:var(--bg);color:var(--text);margin:0;padding:18px}
.container{max-width:980px;margin:auto}
.box{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:14px}
h1{margin:0 0 8px 0;font-size:28px}
.small{color:var(--muted);font-size:13px;line-height:1.45}
.row{display:grid;gap:10px}
.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:10px}
.filters{display:grid;grid-template-columns:1fr;gap:10px}
.actions{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:12px}
.bottom{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.tabs{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.stat{background:#0b1220;border:1px solid var(--line);border-radius:10px;padding:10px 12px;font-size:13px}
label{display:block;color:var(--muted);font-size:12px;margin-bottom:8px;text-transform:uppercase}
select,input[type="text"],input[type="range"],button{font:inherit}
select,input[type="text"]{width:100%;padding:12px 14px;min-height:48px;border-radius:10px;border:1px solid #475569;background:#0b1220;color:var(--text)}
button{width:100%;padding:12px;min-height:48px;border:none;border-radius:10px;font-weight:700;cursor:pointer;color:#111827}
.modebtn,.secondary,.tabbtn{background:var(--soft)}
.modebtn.active,.tabbtn.active{outline:2px solid var(--blue)}
.check{background:var(--violet)} .reveal{background:var(--green)} .pronounce{background:var(--blue)} .skip{background:var(--orange)} .next{background:#06b6d4}
.badges{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.badge{background:#0b1220;border:1px solid var(--line);border-radius:999px;padding:6px 10px;font-size:12px}
.word{font-size:clamp(34px,5vw,54px);font-weight:800;text-align:center;line-height:1.1;margin:18px 0}
.feedback{min-height:44px;text-align:center;line-height:1.4;margin-top:12px}
.good{color:#86efac}.mid{color:#fde68a}.bad{color:#fca5a5}
.translation{display:none;margin-top:10px;font-size:28px;text-align:center;color:#cbd5e1}
.translation.show{display:block}
.tabPane{display:none}
.tabPane.active{display:block}
.item{background:#0b1220;border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-top:8px}
.itemHead{font-weight:700;margin-bottom:4px}
.itemMeta{font-size:12px;color:var(--muted)}
.empty{color:var(--muted);text-align:center;padding:12px}
@media (min-width:760px){
  .stats{grid-template-columns:repeat(6,1fr)}
  .filters{grid-template-columns:repeat(4,1fr)}
  .actions{grid-template-columns:repeat(8,1fr)}
  .tabs{grid-template-columns:repeat(5,1fr)}
}
</style>
</head>
<body>
<div class="container">
  <div class="box">
    <h1>Spanish Vocabulary Trainer</h1>
    <div class="small">Simple and friendly layout. Progress is saved on this browser/device.</div>
    <div class="stats">
      <div class="stat">Card: <span id="cardNum">1</span>/<span id="visibleCount">0</span></div>
      <div class="stat">Database: <span id="totalCount">0</span></div>
      <div class="stat">Checks: <span id="checks">0</span></div>
      <div class="stat">Average: <span id="avg">0%</span></div>
      <div class="stat">Skips: <span id="skips">0</span></div>
      <div class="stat">Reveals: <span id="reveals">0</span></div>
    </div>
  </div>

  <div class="box filters">
    <div>
      <label>Mode</label>
      <select id="mode" onchange="setMode(this.value)">
        <option value="random">Random</option>
        <option value="s2e">Spanish → English</option>
        <option value="e2s">English → Spanish</option>
      </select>
    </div>
    <div>
      <label>Topic</label>
      <select id="topic" onchange="setTopic(this.value)">
        <option value="All">All topics</option>
      </select>
    </div>
    <div>
      <label>Type</label>
      <select id="type" onchange="setType(this.value)">
        <option value="All">All types</option>
      </select>
    </div>
    <div>
      <label>Practice source</label>
      <select id="source" onchange="setPracticeSource(this.value)">
        <option value="all">All words</option>
        <option value="favorites">Favorites only</option>
        <option value="mistakes">Mistakes only</option>
        <option value="revealed">Revealed only</option>
        <option value="passes">Passes only</option>
      </select>
    </div>
  </div>

  <div class="box">
    <label>Accuracy threshold: <span id="thresholdText">75%</span></label>
    <input id="threshold" type="range" min="50" max="100" step="5" value="75" oninput="setThreshold(this.value)">
  </div>

  <div class="box">
    <div id="card"></div>
  </div>

  <div class="box">
    <div class="tabs">
      <button class="tabbtn active" id="tabbtn-overview" onclick="showTab('overview')">Overview</button>
      <button class="tabbtn" id="tabbtn-favorites" onclick="showTab('favorites')">Favorites</button>
      <button class="tabbtn" id="tabbtn-mistakes" onclick="showTab('mistakes')">Mistakes</button>
      <button class="tabbtn" id="tabbtn-revealed" onclick="showTab('revealed')">Revealed</button>
      <button class="tabbtn" id="tabbtn-passes" onclick="showTab('passes')">Passes</button>
    </div>
    <div id="tab-overview" class="tabPane active">
      <div class="small" style="padding-top:12px">Use the Practice source filter to test only Favorites, Mistakes, Revealed words, or Passes.</div>
    </div>
    <div id="tab-favorites" class="tabPane"></div>
    <div id="tab-mistakes" class="tabPane"></div>
    <div id="tab-revealed" class="tabPane"></div>
    <div id="tab-passes" class="tabPane"></div>
  </div>

  <div class="box bottom">
    <button class="secondary" onclick="shuffleDeck()">Shuffle</button>
    <button class="secondary" onclick="restartDeck()">Restart session</button>
    <button class="secondary" onclick="clearSavedData()">Clear saved data</button>
    <div class="small" id="msg" style="align-self:center">Ready.</div>
  </div>
</div>

function setMessage(t){ document.getElementById("msg").textContent = t; }
function normalize(text){ return text.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^\w\s/]/g," ").replace(/\s+/g," ").trim(); }
function levenshtein(a,b){const m=a.length,n=b.length;if(!m)return n;if(!n)return m;const dp=Array.from({length:m+1},()=>Array(n+1).fill(0));for(let i=0;i<=m;i++)dp[i][0]=i;for(let j=0;j<=n;j++)dp[0][j]=j;for(let i=1;i<=m;i++){for(let j=1;j<=n;j++){const c=a[i-1]===b[j-1]?0:1;dp[i][j]=Math.min(dp[i-1][j]+1,dp[i][j-1]+1,dp[i-1][j-1]+c)}}return dp[m][n]}
function scoreAnswer(a,b){a=normalize(a);b=normalize(b);if(!a&&!b)return 100;if(!a||!b)return 0;const opts=b.split("/").map(x=>x.trim()).filter(Boolean);let best=0;opts.forEach(opt=>{const dist=levenshtein(a,opt);const maxLen=Math.max(a.length,opt.length)||1;const s=Math.max(0,Math.round((1-dist/maxLen)*100));if(s>best)best=s});return best}

function cap(t){return t?t.charAt(0).toUpperCase()+t.slice(1):t}
function transform(item){
  const m = state.mode==="random" ? (Math.random()<0.5?"s2e":"e2s") : state.mode;
  if(m==="s2e"){ return {id:item.id,front:cap(item.spanish),back:cap(item.english),rawBack:item.english,spanish:item.spanish,english:item.english,modeLabel:"Spanish → English",topic:item.topic,type:item.type};}
  return {id:item.id,front:cap(item.english),back:cap(item.spanish),rawBack:item.spanish,spanish:item.spanish,english:item.english,modeLabel:"English → Spanish",topic:item.topic,type:item.type};
}
function addUnique(list,obj){ if(!list.some(x=>x.id===obj.id)) list.unshift(obj); }
function sourceIds(){
  if(state.source==="favorites") return new Set(state.favorites.map(x=>x.id||x));
  if(state.source==="mistakes") return new Set(state.mistakes.map(x=>x.id));
  if(state.source==="revealed") return new Set(state.revealed.map(x=>x.id));
  if(state.source==="passes") return new Set(state.passes.map(x=>x.id));
  return null;
}
function rebuildDeck(){
  const ids = sourceIds();
  state.deck = shuffle(
    baseDeck
      .filter(x => (state.topic==="All"||x.topic===state.topic) && (state.type==="All"||x.type===state.type) && (!ids || ids.has(x.id)))
      .map(transform)
  );
  if(state.index >= state.deck.length) state.index = 0;
  saveState();
  render();
}
function current(){ return state.deck[state.index]; }
function updateStats(){
  document.getElementById("totalCount").textContent = baseDeck.length;
  document.getElementById("cardNum").textContent = state.deck.length ? state.index+1 : 0;
  document.getElementById("visibleCount").textContent = state.deck.length;
  document.getElementById("checks").textContent = state.checks;
  document.getElementById("avg").textContent = state.checks ? Math.round(state.accuracySum/state.checks)+"%" : "0%";
  document.getElementById("skips").textContent = state.skips;
  document.getElementById("reveals").textContent = state.reveals;
}
function renderList(id,list,emptyText,showScore=false){
  const el = document.getElementById(id);
  if(!list.length){ el.innerHTML = `<div class="empty">${emptyText}</div>`; return; }
  el.innerHTML = list.map(item => `<div class="item"><div class="itemHead">${item.spanish} → ${item.english}</div><div class="itemMeta">${item.topic} • ${item.type}${showScore&&item.score!==undefined ? " • score: "+item.score+"%" : ""}</div></div>`).join("");
}
function renderTabs(){
  renderList("tab-favorites", state.favorites.map(x => x.id ? x : baseDeck.find(b=>b.id===x)).filter(Boolean), "No favorites yet.");
  renderList("tab-mistakes", state.mistakes, "No mistakes yet.", true);
  renderList("tab-revealed", state.revealed, "No revealed words yet.");
  renderList("tab-passes", state.passes, "No passed words yet.");
}
function render(){
  updateStats();
  renderTabs();
  const root = document.getElementById("card");
  if(!state.deck.length){ root.innerHTML = '<div class="empty">No cards in this filter combination.</div>'; return; }
  const c = current();
  const fav = state.favorites.some(x => (x.id||x)===c.id);
  root.innerHTML = `
    <div class="badges">
      <div class="badge">${c.modeLabel}</div>
      <div class="badge">${c.topic}</div>
      <div class="badge">${c.type}</div>

    </div>
    <div class="word">${c.front}</div>
    <input id="answer" type="text" placeholder="Type your answer here">
    <div class="actions">
      <button class="check" onclick="checkAnswer()">Check</button>
      <button class="reveal" onclick="revealAnswer()">Reveal</button>
      <button class="pronounce" onclick="pronounce(false)">Pronounce</button>
      <button class="pronounce" onclick="pronounce(true)">Slow</button>
      <button class="skip" onclick="skipCard()">Skip</button>
      <button class="secondary" onclick="toggleFavorite()">${fav ? '★ Favorited' : '☆ Favorite'}</button>

      <button class="next" onclick="nextCard()">Next</button>
    </div>
    <div id="feedback" class="feedback"></div>
    <div id="translation" class="translation">${c.back}</div>
  `;
  saveState();
}
function checkAnswer(){
  if(!state.deck.length) return;
  const input = document.getElementById("answer");
  if(!input || !input.value.trim()){ setMessage("Type an answer first."); return; }
  const c = current();
  const score = scoreAnswer(input.value.trim(), c.rawBack);
  state.checks++; state.accuracySum += score;
  const fb = document.getElementById("feedback");
  if(score >= state.threshold){
    fb.className = "feedback good";
    fb.innerHTML = `Correct enough: ${score}%`;
  } else if(score >= state.threshold - 15){
    fb.className = "feedback mid";
    fb.innerHTML = `Close: ${score}% <div class="small">Target: ${c.back}</div>`;
    addUnique(state.mistakes, {id:c.id,spanish:c.spanish,english:c.english,topic:c.topic,type:c.type,score:score});
  } else {
    fb.className = "feedback bad";
    fb.innerHTML = `Not correct: ${score}% <div class="small">Target: ${c.back}</div>`;
    addUnique(state.mistakes, {id:c.id,spanish:c.spanish,english:c.english,topic:c.topic,type:c.type,score:score});
  }
  saveState(); renderTabs(); updateStats(); setMessage("Answer checked.");
}
function revealAnswer(){
  if(!state.deck.length) return;
  const c = current();
  const t = document.getElementById("translation");
  if(t) t.classList.add("show");
  state.reveals++;
  addUnique(state.revealed, {id:c.id,spanish:c.spanish,english:c.english,topic:c.topic,type:c.type});
  saveState(); renderTabs(); updateStats(); setMessage("Translation revealed.");
}
function pronounce(slow){
  if(!("speechSynthesis" in window)){ setMessage("Speech is not supported in this browser."); return; }
  const u = new SpeechSynthesisUtterance(current().spanish);
  u.lang = "es-ES"; u.rate = slow ? 0.6 : 0.9;
  window.speechSynthesis.cancel(); window.speechSynthesis.speak(u);
  setMessage(slow ? "Pronouncing slowly." : "Pronouncing Spanish term.");
}
function toggleFavorite(){
  const c = current();
  const exists = state.favorites.some(x => (x.id||x)===c.id);
  if(exists){ state.favorites = state.favorites.filter(x => (x.id||x)!==c.id); setMessage("Removed from favorites."); }
  else { state.favorites.unshift({id:c.id,spanish:c.spanish,english:c.english,topic:c.topic,type:c.type}); setMessage("Added to favorites."); }
  saveState(); renderTabs(); render();
}
function skipCard(){
  const c = current();
  state.skips++;
  addUnique(state.passes, {id:c.id,spanish:c.spanish,english:c.english,topic:c.topic,type:c.type});
  nextCard(false);
  setMessage("Card skipped.");
}
function nextCard(msg=true){ if(!state.deck.length) return; state.index = (state.index+1)%state.deck.length; render(); if(msg) setMessage("Next card."); }
function previousCard(){ if(!state.deck.length) return; state.index = (state.index-1+state.deck.length)%state.deck.length; render(); setMessage("Previous card."); }
function shuffleDeck(){ state.deck = shuffle(state.deck); state.index = 0; render(); setMessage("Deck shuffled."); }
function restartDeck(){ state.checks=0; state.accuracySum=0; state.skips=0; state.reveals=0; state.index=0; rebuildDeck(); setMessage("Session restarted."); }
function clearSavedData(){ localStorage.removeItem(STORAGE_KEY); location.reload(); }
function setMode(v){ state.mode=v; rebuildDeck(); }
function setTopic(v){ state.topic=v; rebuildDeck(); }
function setType(v){ state.type=v; rebuildDeck(); }
function setPracticeSource(v){ state.source=v; rebuildDeck(); }
function setThreshold(v){ state.threshold=Number(v); document.getElementById("thresholdText").textContent = state.threshold+"%"; saveState(); }
function showTab(name){
  document.querySelectorAll(".tabbtn").forEach(b=>b.classList.remove("active"));
  document.querySelectorAll(".tabPane").forEach(p=>p.classList.remove("active"));
  document.getElementById("tabbtn-"+name).classList.add("active");
  document.getElementById("tab-"+name).classList.add("active");
}
function initUI(){
  const topic = document.getElementById("topic");
  topics.forEach(t => { const o=document.createElement("option"); o.value=t; o.textContent=t; topic.appendChild(o); });
  const type = document.getElementById("type");
  types.filter(t=>t!=="All").forEach(t => { const o=document.createElement("option"); o.value=t; o.textContent=t; type.appendChild(o); });
  document.getElementById("mode").value = state.mode;
  document.getElementById("topic").value = state.topic;
  document.getElementById("type").value = state.type;
  document.getElementById("source").value = state.source;
  document.getElementById("threshold").value = state.threshold;
  document.getElementById("thresholdText").textContent = state.threshold+"%";
}
loadState();
initUI();
if(!state.deck || !state.deck.length) rebuildDeck(); else render();
</script>
</body>
</html>
