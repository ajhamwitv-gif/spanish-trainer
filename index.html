<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Spanish Vocabulary Trainer</title>
<style>
:root{--bg:#0f172a;--panel:#111827;--panel2:#1f2937;--line:#334155;--text:#e5e7eb;--muted:#94a3b8;--green:#22c55e;--blue:#38bdf8;--orange:#f59e0b;--violet:#a78bfa}
*{box-sizing:border-box}
body{font-family:Arial,sans-serif;background:var(--bg);color:var(--text);margin:0;padding:20px}
.container{max-width:980px;margin:auto}
.box{background:var(--panel);border:1px solid var(--line);border-radius:15px;padding:18px;margin-bottom:14px}
h1{margin:0 0 8px 0}
.small{color:var(--muted);font-size:13px;line-height:1.45}
.stats,.filters,.controls,.footer{display:grid;gap:10px}
.stats{grid-template-columns:repeat(2,1fr);margin-top:10px}
.filters{grid-template-columns:1fr}
.controls{grid-template-columns:repeat(2,1fr);margin-top:12px}
.footer{grid-template-columns:repeat(2,1fr)}
.stat{background:#0b1220;border:1px solid var(--line);border-radius:10px;padding:10px 12px;font-size:13px}
label{display:block;color:var(--muted);font-size:12px;margin-bottom:8px;text-transform:uppercase}
select,input[type="text"],input[type="range"],button{font:inherit}
select,input[type="text"]{width:100%;padding:12px 14px;min-height:48px;border-radius:10px;border:1px solid #475569;background:#0b1220;color:var(--text)}
button{width:100%;padding:12px;min-height:48px;border:none;border-radius:10px;font-weight:700;cursor:pointer;color:#111827}
.modebtn{background:#cbd5e1}
.modebtn.active{outline:3px solid #38bdf8}
.check{background:var(--violet)} .reveal{background:var(--green)} .pronounce{background:var(--blue)} .skip{background:var(--orange)} .next{background:#06b6d4} .secondary{background:#cbd5e1}
.badges{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.badge{background:#0b1220;border:1px solid var(--line);border-radius:999px;padding:6px 10px;font-size:12px}
.word{font-size:clamp(34px,5vw,56px);font-weight:800;text-align:center;line-height:1.1;margin:18px 0}
.feedback{min-height:44px;text-align:center;line-height:1.4;margin-top:12px}
.good{color:#86efac}.mid{color:#fde68a}.bad{color:#fca5a5}
.translation{display:none;margin-top:10px;font-size:28px;text-align:center;color:#cbd5e1}
.translation.show{display:block}
@media (min-width:760px){.stats{grid-template-columns:repeat(6,1fr)}.filters{grid-template-columns:1fr 1fr 1fr}.controls{grid-template-columns:repeat(5,1fr)}}
</style>
</head>
<body>
<div class="container">
  <div class="box">
    <h1>Spanish Vocabulary Trainer</h1>
    <div class="small">Full standalone version with filters, word counts, modes, threshold, pronunciation, and stats.</div>
    <div class="stats">
      <div class="stat">Card: <span id="cardNum">1</span>/<span id="visibleCount">0</span></div>
      <div class="stat">Total database: <span id="totalCount">0</span></div>
      <div class="stat">Checks: <span id="checks">0</span></div>
      <div class="stat">Average: <span id="avg">0%</span></div>
      <div class="stat">Skips: <span id="skips">0</span></div>
      <div class="stat">Reveals: <span id="reveals">0</span></div>
    </div>
  </div>

  <div class="box filters">
    <div>
      <label>Mode</label>
      <div class="stats" style="margin-top:0">
        <button id="mode-random" class="modebtn active" onclick="setMode('random')">Random</button>
        <button id="mode-s2e" class="modebtn" onclick="setMode('s2e')">Spanish → English</button>
        <button id="mode-e2s" class="modebtn" onclick="setMode('e2s')">English → Spanish</button>
      </div>
    </div>
    <div>
      <label>Topic</label>
      <select id="topic" onchange="setTopic(this.value)">
        <option value="All">All topics</option>
      </select>
    </div>
    <div>
      <label>Type</label>
      <select id="type" onchange="setType(this.value)">
        <option value="All">All types</option>
      </select>
    </div>
  </div>

  <div class="box">
    <label>Accuracy threshold: <span id="thresholdText">75%</span></label>
    <input id="threshold" type="range" min="50" max="100" step="5" value="75" oninput="setThreshold(this.value)">
  </div>

  <div class="box">
    <div id="card"></div>
  </div>

  <div class="box footer">
    <button class="secondary" onclick="shuffleDeck()">Shuffle</button>
    <button class="secondary" onclick="restartDeck()">Restart</button>
  </div>

  <div class="small" id="msg" style="text-align:center;padding-bottom:14px">Ready.</div>
</div>

const topics = ["Communication", "Directions", "Education", "Family", "Feelings", "Food", "Greetings", "Hobbies", "Introduction", "Languages", "Noun", "Personal info", "Place", "Politeness", "Pronouns", "Relationships", "Shopping", "Sports", "Transport", "Verb", "Work"];
const types = ["All", "Verb", "Noun", "Place", "Phrase", "Word"];

let mode = "random", topicFilter = "All", typeFilter = "All", threshold = 75;
let deck = [], index = 0, checks = 0, accuracySum = 0, skips = 0, reveals = 0;

function initFilters() {
  document.getElementById("totalCount").textContent = baseDeck.length;
  const topic = document.getElementById("topic");
  topics.forEach(t => { const o = document.createElement("option"); o.value = t; o.textContent = t; topic.appendChild(o); });
  const type = document.getElementById("type");
  types.filter(t => t !== "All").forEach(t => { const o = document.createElement("option"); o.value = t; o.textContent = t; type.appendChild(o); });
}
function setMessage(t) { document.getElementById("msg").textContent = t; }
function normalize(text) { return text.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^\w\s/]/g," ").replace(/\s+/g," ").trim(); }
function levenshtein(a,b){const m=a.length,n=b.length;if(!m)return n;if(!n)return m;const dp=Array.from({length:m+1},()=>Array(n+1).fill(0));for(let i=0;i<=m;i++)dp[i][0]=i;for(let j=0;j<=n;j++)dp[0][j]=j;for(let i=1;i<=m;i++){for(let j=1;j<=n;j++){const c=a[i-1]===b[j-1]?0:1;dp[i][j]=Math.min(dp[i-1][j]+1,dp[i][j-1]+1,dp[i-1][j-1]+c)}}return dp[m][n]}
function scoreAnswer(a,b){a=normalize(a);b=normalize(b);if(!a&&!b)return 100;if(!a||!b)return 0;const opts=b.split("/").map(x=>x.trim()).filter(Boolean);let best=0;opts.forEach(opt=>{const dist=levenshtein(a,opt);const maxLen=Math.max(a.length,opt.length)||1;const s=Math.max(0,Math.round((1-dist/maxLen)*100));if(s>best)best=s});return best}
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function cap(t){return t?t.charAt(0).toUpperCase()+t.slice(1):t}
function transform(item){const m=mode==="random"?(Math.random()<0.5?"s2e":"e2s"):mode;if(m==="s2e"){return {front:cap(item.spanish),back:cap(item.english),rawBack:item.english,spanish:item.spanish,modeLabel:"Spanish → English",topic:item.topic,type:item.type}}return {front:cap(item.english),back:cap(item.spanish),rawBack:item.spanish,spanish:item.spanish,modeLabel:"English → Spanish",topic:item.topic,type:item.type}}
function rebuildDeck(){deck=shuffle(baseDeck.filter(x=>(topicFilter==="All"||x.topic===topicFilter)&&(typeFilter==="All"||x.type===typeFilter)).map(transform));index=0;render()}
function updateStats(){document.getElementById("cardNum").textContent=deck.length?index+1:0;document.getElementById("visibleCount").textContent=deck.length;document.getElementById("checks").textContent=checks;document.getElementById("avg").textContent=checks?Math.round(accuracySum/checks)+"%":"0%";document.getElementById("skips").textContent=skips;document.getElementById("reveals").textContent=reveals}
function current(){return deck[index]}
function render(){updateStats();const root=document.getElementById("card");if(!deck.length){root.innerHTML='<div class="feedback bad">No cards in this filter combination.</div>';setMessage("Choose another topic or type.");return}const c=current();root.innerHTML=`<div class="badges"><div class="badge">${c.modeLabel}</div><div class="badge">${c.topic}</div><div class="badge">${c.type}</div></div><div class="word">${c.front}</div><input id="answer" type="text" placeholder="Type your answer here"><div class="controls"><button class="check" onclick="checkAnswer()">Check</button><button class="reveal" onclick="revealAnswer()">Reveal</button><button class="pronounce" onclick="pronounceWord()">Pronounce</button><button class="skip" onclick="skipCard()">Skip</button><button class="next" onclick="nextCard()">Next</button></div><div id="feedback" class="feedback"></div><div id="translation" class="translation">${c.back}</div>`}
function checkAnswer(){if(!deck.length)return;const input=document.getElementById("answer");if(!input||!input.value.trim()){setMessage("Type an answer first.");return}const score=scoreAnswer(input.value.trim(),current().rawBack);checks++;accuracySum+=score;updateStats();const fb=document.getElementById("feedback");if(score>=threshold){fb.className="feedback good";fb.innerHTML=`Correct enough: ${score}%`}else if(score>=threshold-15){fb.className="feedback mid";fb.innerHTML=`Close: ${score}% <div class="small">Target: ${current().back}</div>`}else{fb.className="feedback bad";fb.innerHTML=`Not correct: ${score}% <div class="small">Target: ${current().back}</div>`}setMessage("Answer checked.")}
function revealAnswer(){const t=document.getElementById("translation");if(t)t.classList.add("show");reveals++;updateStats();setMessage("Translation revealed.")}
function pronounceWord(){if(!("speechSynthesis" in window)){setMessage("Speech is not supported in this browser.");return}const u=new SpeechSynthesisUtterance(current().spanish);u.lang="es-ES";u.rate=0.9;window.speechSynthesis.cancel();window.speechSynthesis.speak(u);setMessage("Pronouncing Spanish term.")}
function nextCard(){if(!deck.length)return;index=(index+1)%deck.length;render();setMessage("Next card.")}
function skipCard(){if(!deck.length)return;skips++;index=(index+1)%deck.length;render();setMessage("Card skipped.")}
function shuffleDeck(){if(!deck.length)return;deck=shuffle(deck);index=0;render();setMessage("Deck shuffled.")}
function restartDeck(){checks=0;accuracySum=0;skips=0;reveals=0;rebuildDeck();setMessage("Deck restarted.")}
function setMode(m){mode=m;document.querySelectorAll(".modebtn").forEach(b=>b.classList.remove("active"));document.getElementById("mode-"+m).classList.add("active");rebuildDeck();setMessage("Mode changed.")}
function setTopic(v){topicFilter=v;rebuildDeck();setMessage("Topic changed.")}
function setType(v){typeFilter=v;rebuildDeck();setMessage("Type changed.")}
function setThreshold(v){threshold=Number(v);document.getElementById("thresholdText").textContent=threshold+"%";setMessage("Threshold changed.")}
initFilters();rebuildDeck();
</script>
